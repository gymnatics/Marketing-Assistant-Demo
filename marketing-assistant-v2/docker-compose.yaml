version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: casino_crm

  # MongoDB MCP Server
  mongodb-mcp:
    build:
      context: .
      dockerfile: ./services/mongodb-mcp/Dockerfile
    ports:
      - "8090:8090"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: casino_crm
    depends_on:
      - mongodb

  # Event Hub (SSE)
  event-hub:
    build:
      context: .
      dockerfile: ./services/event-hub/Dockerfile
    ports:
      - "5001:5001"

  # Image Generation MCP Server
  imagegen-mcp:
    build:
      context: .
      dockerfile: ./services/imagegen-mcp/Dockerfile
    ports:
      - "8091:8091"
    environment:
      IMAGEGEN_MODEL_ENDPOINT: ${IMAGEGEN_MODEL_ENDPOINT}
      IMAGEGEN_MODEL_NAME: ${IMAGEGEN_MODEL_NAME:-flux2-klein-4b}
      IMAGEGEN_MODEL_TOKEN: ${IMAGEGEN_MODEL_TOKEN:-}
      IMAGEGEN_MODEL_TOKEN: ${IMAGEGEN_MODEL_TOKEN:-}
      IMAGEGEN_MCP_SELF_URL: http://imagegen-mcp:8091

  # Creative Producer Agent
  creative-producer:
    build:
      context: .
      dockerfile: ./services/creative-producer/Dockerfile
    ports:
      - "8081:8081"
    environment:
      CODE_MODEL_ENDPOINT: ${CODE_MODEL_ENDPOINT}
      CODE_MODEL_NAME: ${CODE_MODEL_NAME:-qwen25-coder-32b-fp8}
      CODE_MODEL_TOKEN: ${CODE_MODEL_TOKEN}
      EVENT_HUB_URL: http://event-hub:5001
      IMAGEGEN_MCP_URL: http://imagegen-mcp:8091
    depends_on:
      - event-hub
      - imagegen-mcp

  # Customer Analyst Agent
  customer-analyst:
    build:
      context: .
      dockerfile: ./services/customer-analyst/Dockerfile
    ports:
      - "8082:8082"
    environment:
      MONGODB_MCP_URL: http://mongodb-mcp:8090
      EVENT_HUB_URL: http://event-hub:5001
    depends_on:
      - mongodb-mcp
      - event-hub

  # Delivery Manager Agent
  delivery-manager:
    build:
      context: .
      dockerfile: ./services/delivery-manager/Dockerfile
    ports:
      - "8083:8083"
    environment:
      LANG_MODEL_ENDPOINT: ${LANG_MODEL_ENDPOINT}
      LANG_MODEL_NAME: ${LANG_MODEL_NAME:-qwen3-32b-fp8-dynamic}
      LANG_MODEL_TOKEN: ${LANG_MODEL_TOKEN}
      EVENT_HUB_URL: http://event-hub:5001
      CLUSTER_DOMAIN: ${CLUSTER_DOMAIN:-localhost}
      DEV_NAMESPACE: ${DEV_NAMESPACE:-marketing-assistant-dev}
      PROD_NAMESPACE: ${PROD_NAMESPACE:-marketing-assistant-prod}
    depends_on:
      - event-hub

  # Campaign Director (Orchestrator)
  campaign-director:
    build:
      context: .
      dockerfile: ./services/campaign-director/Dockerfile
    ports:
      - "8080:8080"
    environment:
      CREATIVE_PRODUCER_URL: http://creative-producer:8081
      CUSTOMER_ANALYST_URL: http://customer-analyst:8082
      DELIVERY_MANAGER_URL: http://delivery-manager:8083
      EVENT_HUB_URL: http://event-hub:5001
      CLUSTER_DOMAIN: ${CLUSTER_DOMAIN:-localhost}
      DEV_NAMESPACE: ${DEV_NAMESPACE:-marketing-assistant-dev}
      PROD_NAMESPACE: ${PROD_NAMESPACE:-marketing-assistant-prod}
    depends_on:
      - creative-producer
      - customer-analyst
      - delivery-manager
      - event-hub

  # Campaign API Gateway
  campaign-api:
    build:
      context: .
      dockerfile: ./services/campaign-api/Dockerfile
    ports:
      - "5000:5000"
    environment:
      CAMPAIGN_DIRECTOR_URL: http://campaign-director:8080
    depends_on:
      - campaign-director

  # React Frontend (dev mode - no build needed)
  frontend:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm start"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - campaign-api
      - event-hub

volumes:
  mongodb_data:

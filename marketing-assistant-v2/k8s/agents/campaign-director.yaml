apiVersion: apps/v1
kind: Deployment
metadata:
  name: campaign-director
  namespace: marketing-assistant-v2
  labels:
    app: campaign-director
    component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campaign-director
  template:
    metadata:
      labels:
        app: campaign-director
        component: agent
    spec:
      containers:
        - name: agent
          image: quay.io/rh-ee-dayeo/marketing-assistant-v2-campaign-director:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: marketing-assistant-config
            - secretRef:
                name: marketing-assistant-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: campaign-director
  namespace: marketing-assistant-v2
spec:
  selector:
    app: campaign-director
  ports:
    - port: 8080
      targetPort: 8080

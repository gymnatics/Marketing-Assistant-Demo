apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-manager
  namespace: marketing-assistant-v2
  labels:
    app: delivery-manager
    component: agent
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    kagenti.io/framework: Custom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-manager
  template:
    metadata:
      labels:
        app: delivery-manager
        component: agent
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
    spec:
      serviceAccountName: delivery-manager
      containers:
        - name: agent
          image: quay.io/rh-ee-dayeo/marketing-assistant:delivery-manager
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: marketing-assistant-config
            - secretRef:
                name: marketing-assistant-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-manager
  namespace: marketing-assistant-v2
spec:
  selector:
    app: delivery-manager
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: delivery-manager
  namespace: marketing-assistant-v2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: delivery-manager-deployer
rules:
  - apiGroups: [""]
    resources: ["configmaps", "services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: delivery-manager-deployer-binding
subjects:
  - kind: ServiceAccount
    name: delivery-manager
    namespace: marketing-assistant-v2
roleRef:
  kind: ClusterRole
  name: delivery-manager-deployer
  apiGroup: rbac.authorization.k8s.io

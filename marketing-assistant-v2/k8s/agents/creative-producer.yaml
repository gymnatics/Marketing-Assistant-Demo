apiVersion: apps/v1
kind: Deployment
metadata:
  name: creative-producer
  namespace: marketing-assistant-v2
  labels:
    app: creative-producer
    component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: creative-producer
  template:
    metadata:
      labels:
        app: creative-producer
        component: agent
    spec:
      containers:
        - name: agent
          image: quay.io/rh-ee-dayeo/marketing-assistant:creative-producer
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: marketing-assistant-config
            - secretRef:
                name: marketing-assistant-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: creative-producer
  namespace: marketing-assistant-v2
spec:
  selector:
    app: creative-producer
  ports:
    - port: 8081
      targetPort: 8081

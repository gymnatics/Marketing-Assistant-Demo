apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/template-display-name: Latest vLLM Omni (Multimodal) NVIDIA ServingRuntime for KServe
    opendatahub.io/template-name: vllm-omni-runtime-latest
    openshift.io/display-name: Latest vLLM Omni (Multimodal) NVIDIA ServingRuntime for KServe
  name: vllm-omni-runtime-latest
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - args:
        - serve
        - /mnt/models
        - --omni
        - --port=8080
        - --served-model-name={{.Name}}
        - --host=0.0.0.0
        - --gpu-memory-utilization=0.90
        - --trust-remote-code
      command:
        - vllm
      env:
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /tmp/hf_home
        - name: VLLM_ATTENTION_BACKEND
          value: FLASH_ATTN
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: expandable_segments:True
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
        - name: FLASHINFER_WORKSPACE_DIR
          value: /tmp/flashinfer
        - name: TRITON_CACHE_DIR
          value: /tmp/triton_cache
      image: vllm/vllm-omni:v0.18.0
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
      volumeMounts:
        - mountPath: /dev/shm
          name: shm
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
  volumes:
    - emptyDir:
        medium: Memory
        sizeLimit: 8Gi
      name: shm

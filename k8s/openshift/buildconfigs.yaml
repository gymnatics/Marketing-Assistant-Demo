# Binary Docker builds: upload context from your laptop via `oc start-build ... --from-dir=`.
# Repo-root services use context = repository root; frontend uses context = ./frontend.
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mongodb-mcp
  labels:
    app.kubernetes.io/part-of: marketing-assistant
spec:
  successfulBuildsHistoryLimit: 3
  failedBuildsHistoryLimit: 3
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: services/mongodb-mcp/Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: marketing-assistant:mongodb-mcp
---

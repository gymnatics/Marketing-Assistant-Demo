# Git-based Docker builds: cluster clones from GitHub and builds images.
# Images are pushed to quay.io for cross-cluster portability.
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mongodb-mcp
  labels:
    app.kubernetes.io/part-of: marketing-assistant
spec:
  successfulBuildsHistoryLimit: 3
  failedBuildsHistoryLimit: 3
  source:
    type: Git
    git:
      uri: https://github.com/gymnatics/Marketing-Assistant-Demo.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: services/mongodb-mcp/Dockerfile
  output:
    to:
      kind: DockerImage
      name: quay.io/rh-ee-dayeo/marketing-assistant:mongodb-mcp
    pushSecret:
      name: quay-push-secret
---

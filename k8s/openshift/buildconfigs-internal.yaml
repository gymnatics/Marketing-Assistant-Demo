# Git-based Docker builds: cluster clones from GitHub and builds images.
# Images are pushed to the INTERNAL OpenShift image registry (ImageStream).
# Use this instead of buildconfigs.yaml to avoid pushing to quay.io.
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mongodb-mcp
  labels:
    app.kubernetes.io/part-of: marketing-assistant
spec:
  successfulBuildsHistoryLimit: 3
  failedBuildsHistoryLimit: 3
  source:
    type: Git
    git:
      uri: https://github.com/gymnatics/Marketing-Assistant-Demo.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: services/mongodb-mcp/Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: marketing-assistant:mongodb-mcp

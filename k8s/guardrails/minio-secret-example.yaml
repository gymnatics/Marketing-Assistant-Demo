# MinIO data connection for guardrail detector models
# Copy this file, fill in values, and apply:
#   cp minio-secret-example.yaml minio-secret.yaml
#   oc apply -f minio-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: minio-data-connection-detector-models
  labels:
    opendatahub.io/dashboard: 'true'
    opendatahub.io/managed: 'true'
  annotations:
    opendatahub.io/connection-type: s3
    openshift.io/display-name: Minio Data Connection - Guardrail Detector Models
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: THEACCESSKEY
  AWS_DEFAULT_REGION: us-east-1
  AWS_S3_BUCKET: huggingface
  AWS_S3_ENDPOINT: http://minio-storage-guardrail-detectors:9000
  AWS_SECRET_ACCESS_KEY: THESECRETKEY

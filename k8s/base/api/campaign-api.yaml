apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    app.openshift.io/connects-to: '["campaign-director","policy-guardian"]'
  labels:
    app: campaign-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/instance: campaign-api
    app.kubernetes.io/part-of: simon-casino-app
    app.openshift.io/runtime: python
    component: api
  name: campaign-api
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: campaign-api
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"        
      labels:
        app: campaign-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/instance: campaign-api
        app.kubernetes.io/part-of: simon-casino-app
        app.openshift.io/runtime: python
        component: api
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: marketing-assistant-config
        image: quay.io/rh-ee-dayeo/marketing-assistant:campaign-api
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
        name: api
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: campaign-api
spec:
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: campaign-api
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: campaign-api
spec:
  port:
    targetPort: 5000
  tls:
    termination: edge
  to:
    kind: Service
    name: campaign-api

apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-hub
  labels:
    app: event-hub
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-hub
  template:
    metadata:
      labels:
        app: event-hub
        component: api
    spec:
      containers:
        - name: hub
          image: quay.io/rh-ee-dayeo/marketing-assistant:event-hub
          ports:
            - containerPort: 5001
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: event-hub
spec:
  selector:
    app: event-hub
  ports:
    - port: 5001
      targetPort: 5001
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: event-hub
  annotations:
    haproxy.router.openshift.io/timeout: 300s
spec:
  to:
    kind: Service
    name: event-hub
  port:
    targetPort: 5001
  tls:
    termination: edge

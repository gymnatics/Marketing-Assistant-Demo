apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: creative-producer
    component: agent
    kagenti.io/framework: custom
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ''
  name: creative-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: creative-producer
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-python: 'true'
        sidecar.opentelemetry.io/inject: app-sidecar
      labels:
        app: creative-producer
        component: agent
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: marketing-assistant-config
        - secretRef:
            name: marketing-assistant-secrets
        image: quay.io/rh-ee-dayeo/marketing-assistant:creative-producer
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
        name: agent
        ports:
        - containerPort: 8081
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: creative-producer
spec:
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: creative-producer

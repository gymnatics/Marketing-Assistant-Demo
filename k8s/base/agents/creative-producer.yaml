apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    app.openshift.io/connects-to: '["imagegen-mcp"]'
  labels:
    app: creative-producer
    app.kubernetes.io/component: backend
    app.kubernetes.io/instance: creative-producer
    app.kubernetes.io/part-of: simon-casino-agents
    app.openshift.io/runtime: python
    component: agent
    kagenti.io/framework: Python
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ''
  name: creative-producer
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: creative-producer
  template:
    metadata:
      labels:
        app: creative-producer
        app.kubernetes.io/component: backend
        app.kubernetes.io/instance: creative-producer
        app.kubernetes.io/part-of: simon-casino-agents
        app.openshift.io/runtime: python
        component: agent
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: marketing-assistant-config
        - secretRef:
            name: marketing-assistant-secrets
        image: quay.io/rh-ee-dayeo/marketing-assistant:creative-producer
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
        name: agent
        ports:
        - containerPort: 8081
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: creative-producer
spec:
  ports:
  - name: a2a
    port: 8080
    targetPort: 8081
  - name: original
    port: 8081
    targetPort: 8081
  selector:
    app: creative-producer

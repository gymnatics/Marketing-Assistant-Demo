apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: delivery-manager
    component: agent
    kagenti.io/framework: custom
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ''
  name: delivery-manager
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: delivery-manager
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-python: 'true'
        sidecar.opentelemetry.io/inject: app-sidecar
      labels:
        app: delivery-manager
        component: agent
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: marketing-assistant-config
        - secretRef:
            name: marketing-assistant-secrets
        image: quay.io/rh-ee-dayeo/marketing-assistant:delivery-manager
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 10
          periodSeconds: 30
        name: agent
        ports:
        - containerPort: 8083
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
      serviceAccountName: delivery-manager
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-manager
spec:
  ports:
  - name: a2a
    port: 8080
    targetPort: 8083
  - name: original
    port: 8083
    targetPort: 8083
  selector:
    app: delivery-manager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: delivery-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: delivery-manager-deployer
rules:
- apiGroups:
  - ''
  resources:
  - configmaps
  - services
  verbs:
  - get
  - list
  - create
  - update
  - patch
  - delete
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - create
  - update
  - patch
  - delete
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - get
  - list
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: delivery-manager-deployer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: delivery-manager-deployer
subjects:
- kind: ServiceAccount
  name: delivery-manager

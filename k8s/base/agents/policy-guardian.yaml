apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-guardian
  labels:
    app: policy-guardian
    app.kubernetes.io/component: backend
    app.kubernetes.io/instance: policy-guardian
    app.kubernetes.io/part-of: simon-casino-agents
    app.openshift.io/runtime: python
    component: agent
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    kagenti.io/framework: Python
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: policy-guardian
  template:
    metadata:
      labels:
        app: policy-guardian
        app.kubernetes.io/component: backend
        app.kubernetes.io/instance: policy-guardian
        app.kubernetes.io/part-of: simon-casino-agents
        app.openshift.io/runtime: python
        component: agent
    spec:
      containers:
        - name: agent
          image: quay.io/rh-ee-dayeo/marketing-assistant:policy-guardian
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: marketing-assistant-config
            - secretRef:
                name: marketing-assistant-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: policy-guardian
spec:
  selector:
    app: policy-guardian
  ports:
    - name: a2a
      port: 8080
      targetPort: 8084
    - name: original
      port: 8084
      targetPort: 8084

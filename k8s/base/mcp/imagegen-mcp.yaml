apiVersion: apps/v1
kind: Deployment
metadata:
  name: imagegen-mcp
  labels:
    app: imagegen-mcp
    component: mcp
    kagenti.io/type: tool
    protocol.kagenti.io/mcp: ""
    kagenti.io/transport: streamable_http
    app.kubernetes.io/name: imagegen-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imagegen-mcp
  template:
    metadata:
      labels:
        app: imagegen-mcp
        component: mcp
        kagenti.io/type: tool
        protocol.kagenti.io/mcp: ""
        kagenti.io/transport: streamable_http
        app.kubernetes.io/name: imagegen-mcp
    spec:
      containers:
        - name: mcp
          image: quay.io/rh-ee-dayeo/marketing-assistant:imagegen-mcp
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          envFrom:
            - configMapRef:
                name: marketing-assistant-config
            - secretRef:
                name: marketing-assistant-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: imagegen-mcp
spec:
  selector:
    app: imagegen-mcp
  ports:
    - port: 8091
      targetPort: 8091

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-mcp
  labels:
    app: mongodb-mcp
    component: mcp
    kagenti.io/type: tool
    protocol.kagenti.io/mcp: ""
    kagenti.io/transport: streamable_http
    app.kubernetes.io/name: mongodb-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-mcp
  template:
    metadata:
      labels:
        app: mongodb-mcp
        component: mcp
        kagenti.io/type: tool
        protocol.kagenti.io/mcp: ""
        kagenti.io/transport: streamable_http
        app.kubernetes.io/name: mongodb-mcp
    spec:
      containers:
        - name: mcp
          image: quay.io/rh-ee-dayeo/marketing-assistant:mongodb-mcp
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: marketing-assistant-config
            - secretRef:
                name: marketing-assistant-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-mcp
spec:
  selector:
    app: mongodb-mcp
  ports:
    - port: 8090
      targetPort: 8090

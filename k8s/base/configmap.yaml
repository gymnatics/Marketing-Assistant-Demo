apiVersion: v1
kind: ConfigMap
metadata:
  name: marketing-assistant-config
data:
  CODE_MODEL_NAME: "qwen25-coder-32b-fp8"
  LANG_MODEL_NAME: "qwen3-32b-fp8-dynamic"
  LANG_MODEL_API_KEY: ""
  IMAGEGEN_MODEL_NAME: "flux2-klein-4b"
  MONGODB_URI: "mongodb://mongodb:27017"
  MONGODB_DATABASE: "casino_crm"

  # Internal service URLs (same across all clusters)
  CAMPAIGN_DIRECTOR_URL: "http://campaign-director:8080"
  CREATIVE_PRODUCER_URL: "http://creative-producer:8081"
  CUSTOMER_ANALYST_URL: "http://customer-analyst:8082"
  DELIVERY_MANAGER_URL: "http://delivery-manager:8083"
  MONGODB_MCP_URL: "http://mongodb-mcp:8090"
  IMAGEGEN_MCP_URL: "http://imagegen-mcp:8091"
  CAMPAIGN_API_URL: "http://campaign-api:5000"
  POLICY_GUARDIAN_URL: "http://policy-guardian:8084"
  EVENT_HUB_URL: "http://event-hub:5001"

  # MLflow GenAI tracing (Campaign Director); set MLFLOW_TRACKING_URI in overlay to enable
  MLFLOW_EXPERIMENT_NAME: "marketing-assistant"
  MLFLOW_TRACKING_URI: ""

  # Sample permission  
  ALLOWED_PLATINUM_TIER: alice

  # SSO (Keycloak) — empty = SSO disabled, app works without login
  # Set by deploy.sh Step 6 when KAgenti is deployed
  KEYCLOAK_URL: ""
  KEYCLOAK_REALM: "kagenti"
  KEYCLOAK_CLIENT_ID: "simon-casino-ui"
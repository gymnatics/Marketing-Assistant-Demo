apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-analyst
  namespace: marketing-assistant-v2
  labels:
    app: customer-analyst
    component: agent
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    kagenti.io/framework: Custom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-analyst
  template:
    metadata:
      labels:
        app: customer-analyst
        component: agent
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
    spec:
      containers:
        - name: agent
          image: quay.io/rh-ee-dayeo/marketing-assistant:customer-analyst
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: marketing-assistant-config
            - secretRef:
                name: marketing-assistant-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: customer-analyst
  namespace: marketing-assistant-v2
spec:
  selector:
    app: customer-analyst
  ports:
    - port: 8082
      targetPort: 8082

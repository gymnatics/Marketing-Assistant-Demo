apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-assistant
  namespace: 0-marketing-assistant-demo
  labels:
    app: marketing-assistant
    app.kubernetes.io/name: marketing-assistant
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketing-assistant
  template:
    metadata:
      labels:
        app: marketing-assistant
    spec:
      serviceAccountName: marketing-assistant-sa
      containers:
      - name: streamlit
        image: image-registry.openshift-image-registry.svc:5000/0-marketing-assistant-demo/marketing-assistant:latest
        ports:
        - containerPort: 8501
          protocol: TCP
        envFrom:
        - configMapRef:
            name: marketing-assistant-config
        - secretRef:
            name: marketing-assistant-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 5
